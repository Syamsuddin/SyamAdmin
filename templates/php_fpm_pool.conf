[{{ pool_name }}]
user = www-data
group = www-data

listen = /run/php/php{{ php_version }}-fpm-{{ pool_name }}.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Process manager
pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

; Timeouts
request_terminate_timeout = 60
request_slowlog_timeout = 5s
slowlog = /var/log/php{{ php_version }}-fpm-{{ pool_name }}-slow.log

; Security
php_admin_value[open_basedir] = {{ root_path }}:/tmp:/var/tmp
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,proc_open,popen
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/php{{ php_version }}-fpm-{{ pool_name }}.error.log
